<html lang="ko">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="AI 외주 대행사 마케팅인사이드의 실시간 조직·프로젝트 현황 보드">

<body>
<style>
  :root {
    --brand:#E8447F; --brand-ink:#C42C64;
    --ground:#F3F1EF; --surface:#FFFFFF; --surface-2:#FAF8F7; --sidebar:#FFFFFF;
    --text:#1E1A22; --text-soft:#625C68; --text-faint:#948D9A; --border:#E6E1E5; --border-strong:#D6D0D6;
    --st-wait:#857E8C; --st-wait-bg:#ECE9EC; --st-go:#2F76F0; --st-go-bg:#E2EAFD;
    --st-review:#C8820A; --st-review-bg:#FAEFD5; --st-rework:#DD4E22; --st-rework-bg:#FBE3DA;
    --st-done:#148A54; --st-done-bg:#D8EFE2;
    --shadow:0 1px 2px rgba(30,26,34,.05),0 8px 22px rgba(30,26,34,.06);
    --radius:14px; --nav-w:268px;
    --mono:"Cascadia Code",Consolas,"D2Coding",ui-monospace,monospace;
    --sans:"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",system-ui,-apple-system,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --ground:#100E14; --surface:#1B1822; --surface-2:#211D2A; --sidebar:#17141D;
    --text:#EFEBF2; --text-soft:#ABA3B2; --text-faint:#766E7D; --border:#2B2733; --border-strong:#3A3544;
    --st-wait:#968E9F; --st-wait-bg:#272430; --st-go:#5D9BFF; --st-go-bg:#17233A;
    --st-review:#EBAA35; --st-review-bg:#322611; --st-rework:#FF7C55; --st-rework-bg:#331b12;
    --st-done:#3FC98A; --st-done-bg:#12311F;
    --shadow:0 1px 2px rgba(0,0,0,.35),0 10px 26px rgba(0,0,0,.4);
  }}
  :root[data-theme="light"]{--ground:#F3F1EF;--surface:#FFFFFF;--surface-2:#FAF8F7;--sidebar:#FFFFFF;--text:#1E1A22;--text-soft:#625C68;--text-faint:#948D9A;--border:#E6E1E5;--border-strong:#D6D0D6;--st-wait:#857E8C;--st-wait-bg:#ECE9EC;--st-go:#2F76F0;--st-go-bg:#E2EAFD;--st-review:#C8820A;--st-review-bg:#FAEFD5;--st-rework:#DD4E22;--st-rework-bg:#FBE3DA;--st-done:#148A54;--st-done-bg:#D8EFE2;--shadow:0 1px 2px rgba(30,26,34,.05),0 8px 22px rgba(30,26,34,.06);}
  :root[data-theme="dark"]{--ground:#100E14;--surface:#1B1822;--surface-2:#211D2A;--sidebar:#17141D;--text:#EFEBF2;--text-soft:#ABA3B2;--text-faint:#766E7D;--border:#2B2733;--border-strong:#3A3544;--st-wait:#968E9F;--st-wait-bg:#272430;--st-go:#5D9BFF;--st-go-bg:#17233A;--st-review:#EBAA35;--st-review-bg:#322611;--st-rework:#FF7C55;--st-rework-bg:#331b12;--st-done:#3FC98A;--st-done-bg:#12311F;--shadow:0 1px 2px rgba(0,0,0,.35),0 10px 26px rgba(0,0,0,.4);}

  *{box-sizing:border-box;}
  body{margin:0;background:var(--ground);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;}
  a{color:inherit;}

  .sidebar{position:fixed;inset:0 auto 0 0;width:var(--nav-w);z-index:40;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
  .main{margin-left:var(--nav-w);min-height:100vh;}
  .mobile-bar{display:none;} .backdrop{display:none;}

  .s-brand{display:flex;align-items:center;gap:12px;padding:20px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--sidebar);z-index:2;}
  .mark{width:40px;height:40px;border-radius:11px;flex:none;background:linear-gradient(145deg,var(--brand),var(--brand-ink));display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px;box-shadow:0 4px 12px rgba(232,68,127,.35);}
  .s-brand h1{margin:0;font-size:16.5px;font-weight:800;letter-spacing:-.3px;}
  .s-brand .sub{margin:1px 0 0;font-size:10.5px;color:var(--text-soft);text-transform:uppercase;letter-spacing:1.3px;font-weight:700;}

  .nav{padding:12px 10px 22px;display:flex;flex-direction:column;gap:3px;}
  .nav-label{font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-faint);padding:14px 12px 6px;display:flex;align-items:center;gap:7px;}
  .nav-label .c{font-family:var(--mono);background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:0 7px;font-size:10px;color:var(--text-soft);font-weight:700;}
  .nav-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;border-radius:10px;padding:9px 12px;cursor:pointer;font-family:var(--sans);font-size:13.5px;color:var(--text-soft);font-weight:600;position:relative;}
  .nav-btn:hover{background:var(--surface-2);color:var(--text);}
  .nav-btn.active{background:color-mix(in srgb,var(--brand) 13%,transparent);color:var(--brand-ink);font-weight:750;}
  .nav-btn.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--brand);}
  :root[data-theme="dark"] .nav-btn.active{color:#F6A8C6;} @media (prefers-color-scheme:dark){.nav-btn.active{color:#F6A8C6;}}
  .nav-btn .ico{width:17px;text-align:center;flex:none;font-size:14px;opacity:.85;}
  .nav-btn .txt{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .nav-btn .dot{width:8px;height:8px;border-radius:50%;flex:none;}
  .nav-btn:focus-visible{outline:2px solid var(--brand);outline-offset:1px;}

  .content{max-width:1080px;padding:30px 30px 70px;}
  .page-head{margin-bottom:22px;}
  .page-head .eyebrow{font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--brand);}
  .page-head h2{margin:5px 0 0;font-size:24px;font-weight:800;letter-spacing:-.5px;text-wrap:balance;}
  .page-head p{margin:6px 0 0;color:var(--text-soft);font-size:13.5px;}

  /* recent delivery highlight */
  .spotlight{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;margin-bottom:22px;position:relative;overflow:hidden;}
  .spotlight::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--st-done);}
  .spotlight .sl-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .spotlight .sl-k{font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;font-weight:700;color:var(--st-done);}
  .spotlight h3{margin:8px 0 2px;font-size:18px;font-weight:750;letter-spacing:-.3px;}
  .spotlight .sl-sub{font-size:12.5px;color:var(--text-soft);}
  .sl-links{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
  .link-btn{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:650;text-decoration:none;padding:8px 13px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);}
  .link-btn:hover{border-color:var(--brand);color:var(--brand-ink);}
  .link-btn .ar{font-size:11px;opacity:.6;}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:26px;}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);}
  .kpi .n{font-family:var(--mono);font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1;}
  .kpi .l{font-size:11.5px;color:var(--text-soft);margin-top:4px;font-weight:600;}
  .kpi.accent .n{color:var(--brand);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;align-items:start;}
  .grid.two{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));}

  .member{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px;box-shadow:var(--shadow);}
  .avatar{width:40px;height:40px;border-radius:11px;flex:none;display:grid;place-items:center;font-weight:750;font-size:13.5px;background:color-mix(in srgb,var(--brand) 14%,var(--surface));color:var(--brand-ink);}
  :root[data-theme="dark"] .avatar{color:#F6A8C6;} @media (prefers-color-scheme:dark){.avatar{color:#F6A8C6;}}
  .member .who{flex:1;min-width:0;}
  .member .m-name{font-size:14.5px;font-weight:750;}
  .member .m-role{font-size:12px;color:var(--text-soft);}
  .member .m-skills{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
  .skill-chip{font-size:10px;font-weight:650;color:var(--text-soft);background:var(--surface-2);border:1px solid var(--border);padding:2px 7px;border-radius:20px;font-family:var(--mono);}
  .member .m-join{font-size:11px;color:var(--text-faint);font-family:var(--mono);white-space:nowrap;}

  .team{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;text-align:left;width:100%;cursor:pointer;font-family:var(--sans);padding:0;color:inherit;display:block;}
  .team:hover{border-color:var(--border-strong);transform:translateY(-2px);}
  .team:focus-visible{outline:2px solid var(--brand);outline-offset:2px;}
  .team::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--rail,var(--st-wait));}
  .team-head{padding:16px 18px 15px 21px;}
  .team-top{display:flex;align-items:flex-start;gap:10px;}
  .team-title{flex:1;min-width:0;}
  .team-title h3{margin:0;font-size:15.5px;font-weight:750;letter-spacing:-.3px;text-wrap:balance;}
  .team-client{margin:3px 0 0;font-size:12px;color:var(--text-soft);}
  .team-client b{color:var(--text);font-weight:650;}
  .progress{margin-top:14px;}
  .progress-bar{height:8px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);overflow:hidden;}
  .progress-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--brand),var(--brand-ink));}
  .progress-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:11.5px;color:var(--text-soft);}
  .progress-meta .pct{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;color:var(--text);}

  .roster{list-style:none;margin:0;padding:6px;border-top:1px solid var(--border);}
  .row{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;}
  .row+.row{border-top:1px solid var(--border);}
  .row .av{width:34px;height:34px;border-radius:10px;flex:none;display:grid;place-items:center;font-size:12.5px;font-weight:750;background:color-mix(in srgb,var(--brand) 12%,var(--surface));color:var(--brand-ink);}
  :root[data-theme="dark"] .row .av{color:#F6A8C6;} @media (prefers-color-scheme:dark){.row .av{color:#F6A8C6;}}
  .row .body{flex:1;min-width:0;}
  .row .r-name{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:7px;}
  .row .r-pos{font-size:11px;font-weight:650;color:var(--text-soft);background:var(--surface-2);border:1px solid var(--border);padding:1px 7px;border-radius:20px;}
  .row .r-task{font-size:12px;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}

  .pill{flex:none;display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:4px 11px 4px 8px;border-radius:20px;white-space:nowrap;}
  .pill .pdot{width:7px;height:7px;border-radius:50%;flex:none;}
  .pill.wait{color:var(--st-wait);background:var(--st-wait-bg);} .pill.wait .pdot{background:var(--st-wait);}
  .pill.go{color:var(--st-go);background:var(--st-go-bg);} .pill.go .pdot{background:var(--st-go);}
  .pill.review{color:var(--st-review);background:var(--st-review-bg);} .pill.review .pdot{background:var(--st-review);}
  .pill.rework{color:var(--st-rework);background:var(--st-rework-bg);} .pill.rework .pdot{background:var(--st-rework);}
  .pill.done{color:var(--st-done);background:var(--st-done-bg);} .pill.done .pdot{background:var(--st-done);}
  .pill.chief{color:#fff;background:var(--brand);} .pill.chief .pdot{background:#fff;}
  .pill.staff{color:var(--st-wait);background:var(--st-wait-bg);} .pill.staff .pdot{background:var(--st-wait);}
  .pill.go .pdot{animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--st-go) 55%,transparent);}50%{box-shadow:0 0 0 4px transparent;}}
  @media (prefers-reduced-motion:reduce){.pill.go .pdot{animation:none;}.team,.sidebar{transition:none!important;}}

  .detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;position:relative;}
  .detail::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--rail,var(--st-wait));}
  .detail-head{padding:20px 24px;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;}
  .detail-head .progress{flex-basis:100%;margin-top:4px;}
  .deliverables{padding:0 24px 22px;}
  .deliverables .dl-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-faint);margin:6px 0 10px;}

  .done-card{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:15px 17px;display:flex;align-items:center;gap:13px;text-align:left;width:100%;cursor:pointer;font-family:var(--sans);color:inherit;}
  .done-card:hover{border-color:var(--border-strong);}
  .done-card .check{width:32px;height:32px;border-radius:50%;flex:none;display:grid;place-items:center;background:var(--st-done-bg);color:var(--st-done);font-weight:800;}
  .done-card .dc-body{flex:1;min-width:0;}
  .done-card h4{margin:0;font-size:14px;font-weight:700;}
  .done-card p{margin:2px 0 0;font-size:12px;color:var(--text-soft);}
  .done-card .arrow{color:var(--text-faint);font-size:14px;}

  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:30px;padding-top:18px;border-top:1px solid var(--border);}
  .foot{margin-top:14px;font-size:12px;color:var(--text-faint);}
  .foot b{color:var(--text-soft);font-weight:600;}
  .sub-label{font-size:12.5px;font-weight:700;color:var(--text-soft);margin:30px 0 12px;letter-spacing:.2px;display:flex;align-items:center;gap:8px;}
  .sub-label .cnt{font-family:var(--mono);font-size:11px;color:var(--text-faint);font-weight:700;}
  .empty{padding:30px 26px;text-align:center;color:var(--text-faint);font-size:13px;border:1px dashed var(--border-strong);border-radius:var(--radius);background:var(--surface-2);line-height:1.7;}
  .empty strong{color:var(--text-soft);display:block;margin-bottom:4px;font-size:14px;}

  .hamb{width:42px;height:42px;border-radius:11px;border:1px solid var(--border);background:var(--surface);display:grid;place-items:center;cursor:pointer;flex:none;}
  .hamb span,.hamb span::before,.hamb span::after{content:"";display:block;width:18px;height:2px;border-radius:2px;background:var(--text);}
  .hamb span{position:relative;} .hamb span::before{position:absolute;top:-6px;} .hamb span::after{position:absolute;top:6px;}
  @media (max-width:860px){
    .sidebar{transform:translateX(-100%);transition:transform .24s ease;box-shadow:0 0 40px rgba(0,0,0,.28);}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0;}
    .mobile-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:20;}
    .mobile-bar .mmark{width:30px;height:30px;border-radius:8px;background:linear-gradient(145deg,var(--brand),var(--brand-ink));display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px;}
    .mobile-bar .mname{font-weight:800;font-size:15px;letter-spacing:-.3px;}
    .backdrop.show{display:block;position:fixed;inset:0;background:rgba(10,8,14,.45);z-index:35;}
    .content{padding:22px 18px 60px;} .page-head h2{font-size:21px;}
  }
</style>

<div class="mobile-bar">
  <button class="hamb" id="hamb" aria-label="메뉴 열기" aria-controls="sidebar" aria-expanded="false"><span></span></button>

</div>
<div class="backdrop" id="backdrop"></div>

<aside class="sidebar" id="sidebar" aria-label="회사 조직 메뉴">
  <div class="s-brand"><div class="mark"><svg width="26" height="26" viewBox="0 0 100 100" aria-hidden="true"><path d="M28 74 L28 34 L50 56 L72 34 L72 74" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><path d="M50 19 C 50.8 25 51.5 25.7 56 26.5 C 51.5 27.3 50.8 28 50 33 C 49.2 28 48.5 27.3 44 26.5 C 48.5 25.7 49.2 25 50 19 Z" fill="#fff"/></svg></div><div><h1>마케팅인사이드</h1><p class="sub">AI 외주 오퍼레이션</p></div></div>
  <nav class="nav" id="nav"></nav>
</aside>

<main class="main"><div class="content" id="content"></div></main>

  // ── 회사 상태 (하네스 ai-company / company-dashboard 가 갱신) ──

    projects:[
      {

        members:[

          {person:"리아", role:"시장 리서처", name:"researcher-market", task:"니치·경쟁·가격정책 확정 중", status:"go"},
          {person:"유나", role:"UI 디자이너", name:"designer-ui", task:"화면 설계 대기", status:"wait"},
          {person:"준호", role:"프론트 개발", name:"dev-frontend", task:"구현 대기", status:"wait"},
          {person:"태오", role:"백엔드 개발", name:"dev-backend", task:"API·DB·결제 대기", status:"wait"},
          {person:"세인", role:"품질 검수", name:"qa-inspector", task:"검수 대기", status:"wait"}
        ]
      }
    ],
    done:[
      {
        name:"로고 + 원페이지 랜딩", client:"네오카페", finishedOn:"2026-07-13", teamSize:4,
        summary:"미니멀 스페셜티 카페 브랜드 로고 3종(벡터) + 반응형 원페이지 랜딩. 검수 7/7 통과.",
        members:[
          {person:"하린", role:"접수·기획 (PM)", name:"intake-pm"},
          {person:"도아", role:"브랜드 디자이너", name:"designer-brand"},
          {person:"준호", role:"프론트 개발", name:"dev-frontend"},
          {person:"세인", role:"품질 검수", name:"qa-inspector"}
        ],
        deliverables:[
          {label:"원페이지 랜딩", url:"https://claude.ai/code/artifact/a0de939e-2506-4e71-9b2a-9eb860656a0c"},
          {label:"브랜드 보드 (로고 3종)", url:"https://claude.ai/code/artifact/7547ed90-5332-481c-8822-e9c230843a21"}
        ]
      }
    ]
  };

  const LABEL={wait:"대기중",go:"진행중",review:"검수중",rework:"재작업",done:"완료",chief:"총괄",staff:"상주"};
  const el=(t,c,h)=>{const n=document.createElement(t);if(c)n.className=c;if(h!=null)n.innerHTML=h;return n;};
  const pill=(s)=>`<span class="pill ${s}"><span class="pdot"></span>${LABEL[s]||s}</span>`;
  const esc=(s)=>String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  const av2=(p)=>esc(String(p).slice(0,2));

  const allStaff=[...state.leadership,...state.hq,...state.specialists];
  const totalStaff=allStaff.length;
  const activeMembers=state.projects.flatMap(p=>p.members).filter(m=>m.status==="go"||m.status==="review").length;

  // ── nav ──
  const nav=document.getElementById("nav");
  let route="overview"; const navBtns=[];
  function addNav(id,ico,txt,dot){const b=el("button","nav-btn");b.dataset.route=id;b.innerHTML=`<span class="ico">${ico}</span><span class="txt">${esc(txt)}</span>`+(dot?`<span class="dot" style="background:var(--st-${dot})"></span>`:"");b.addEventListener("click",()=>go(id));nav.append(b);navBtns.push(b);}
  function addLabel(t,c){nav.append(el("div","nav-label",`<span>${t}</span>`+(c!=null?`<span class="c">${c}</span>`:"")));}
  addNav("overview","▦","전체 현황");
  addNav("lead","★","대표실");
  addNav("staff","◎","전체 구성원");
  addLabel("진행 중인 프로젝트",state.projects.length);
  if(state.projects.length) state.projects.forEach((p,i)=>addNav("p"+i,"▸",p.name,p.status));
  else nav.append(el("div","nav-label",'<span style="color:var(--text-faint);font-weight:600;letter-spacing:0;text-transform:none;font-size:12px">— 진행 중 없음 —</span>'));
  addLabel("완료된 프로젝트",state.done.length);
  state.done.forEach((d,i)=>addNav("d"+i,"✓",d.name,"done"));

  // ── render ──
  const content=document.getElementById("content");
  const head=(e,t,d)=>`<div class="page-head"><div class="eyebrow">${esc(e)}</div><h2>${esc(t)}</h2>${d?`<p>${esc(d)}</p>`:""}</div>`;
  const memberCard=(m,opts={})=>{
    const skills=(m.skills&&m.skills.length)?`<div class="m-skills">${m.skills.map(s=>`<span class="skill-chip">${esc(s)}</span>`).join("")}</div>`:"";
    const right=opts.join&&m.hiredOn?`<span class="m-join">${esc(m.hiredOn)} 입사</span>`:pill(m.status);
    return `<div class="member"><div class="avatar">${av2(m.person)}</div><div class="who"><div class="m-name">${esc(m.person)}</div><div class="m-role">${esc(m.role)}${opts.showName?` · ${esc(m.name)}`:""}</div>${skills}</div>${right}</div>`;
  };
  const rosterHTML=(members)=>`<ul class="roster">`+members.map(m=>`<li class="row"><div class="av">${av2(m.person)}</div><div class="body"><div class="r-name">${esc(m.person)}<span class="r-pos">${esc(m.role)}</span></div><div class="r-task">${esc(m.task||m.name)}</div></div>${m.status?pill(m.status):""}</li>`).join("")+`</ul>`;
  const teamCard=(p,i)=>`<button class="team" data-go="p${i}" style="--rail:var(--st-${p.status})"><div class="team-head"><div class="team-top"><div class="team-title"><h3>${esc(p.name)}</h3><p class="team-client">발주처 · <b>${esc(p.client)}</b></p></div>${pill(p.status)}</div><div class="progress"><div class="progress-bar"><div class="progress-fill" style="width:${p.progress}%"></div></div><div class="progress-meta"><span>${p.members.length}명 편성</span><span class="pct">${p.progress}%</span></div></div></div>${rosterHTML(p.members)}</button>`;

  function render(){
    let html="";
    if(route==="overview"){
      html+=head("Dashboard","전체 현황",`대표 봉남이 · 총 구성원 ${totalStaff}명 · 완료 ${state.done.length}건`);
      const recent=state.done[state.done.length-1];
      if(recent){
        html+=`<div class="spotlight"><div class="sl-top"><span class="sl-k">최근 납품</span>${pill("done")}</div>
          <h3>${esc(recent.name)}</h3><div class="sl-sub">발주처 ${esc(recent.client)} · 팀 ${recent.teamSize}명 · ${esc(recent.finishedOn)}</div>
          <div class="sl-links">${(recent.deliverables||[]).map(d=>`<a class="link-btn" href="${esc(d.url)}" target="_blank" rel="noopener">${esc(d.label)}<span class="ar">↗</span></a>`).join("")}</div></div>`;
      }
      const kpi=[{n:state.projects.length,l:"진행 중 프로젝트",a:true},{n:state.done.length,l:"완료 프로젝트"},{n:totalStaff,l:"총 구성원"},{n:state.specialists.length,l:"채용된 전문가"}];
      html+=`<div class="kpis">`+kpi.map(k=>`<div class="kpi ${k.a?"accent":""}"><div class="n">${k.n}</div><div class="l">${k.l}</div></div>`).join("")+`</div>`;
      html+=`<div class="sub-label">진행 중인 프로젝트 <span class="cnt">${state.projects.length}</span></div>`;
      html+=state.projects.length?`<div class="grid">`+state.projects.map((p,i)=>teamCard(p,i)).join("")+`</div>`
        :`<div class="empty"><strong>지금은 진행 중인 외주가 없습니다.</strong>새 외주가 접수되면 이 자리에 팀이 편성되고 실시간으로 상태가 표시됩니다.</div>`;
      html+=`<div class="sub-label">완료된 프로젝트 <span class="cnt">${state.done.length}</span></div><div class="grid">`+state.done.map((d,i)=>`<button class="done-card" data-go="d${i}"><div class="check">✓</div><div class="dc-body"><h4>${esc(d.name)}</h4><p>${esc(d.client)} · ${d.teamSize}명 · ${esc(d.finishedOn)}</p></div><span class="arrow">→</span></button>`).join("")+`</div>`;
      html+=`<div class="legend">`+["wait","go","review","rework","done"].map(k=>pill(k)).join("")+`</div>`;
      html+=`<p class="foot">설립 <b>${esc(state.founded)}</b> · 마지막 갱신 <b>${esc(state.updated)}</b> · 진행 카드는 <b>ai-company</b> 하네스가 실시간 갱신합니다.</p>`;
    }
    else if(route==="lead"){
      html+=head("대표실","경영진","회사를 총괄하는 대표와 비서.");
      html+=`<div class="grid">`+state.leadership.map(m=>`<div class="member"><div class="avatar" style="background:linear-gradient(145deg,var(--brand),var(--brand-ink));color:#fff">${av2(m.person)}</div><div class="who"><div class="m-name">${esc(m.person)}</div><div class="m-role">${esc(m.role)} · ${esc(m.task)}</div></div>${pill(m.status)}</div>`).join("")+`</div>`;
    }
    else if(route==="staff"){
      html+=head("조직","전체 구성원",`경영 ${state.leadership.length} · 상시 ${state.hq.length} · 채용 전문가 ${state.specialists.length} · 합계 ${totalStaff}명`);
      html+=`<div class="sub-label">대표실 <span class="cnt">${state.leadership.length}</span></div><div class="grid">`+state.leadership.map(m=>memberCard(m)).join("")+`</div>`;
      html+=`<div class="sub-label">본사 상시 조직 <span class="cnt">${state.hq.length}</span></div><div class="grid">`+state.hq.map(m=>memberCard(m,{showName:true})).join("")+`</div>`;
      html+=`<div class="sub-label">채용된 전문가 <span class="cnt">${state.specialists.length}</span></div>`;
      html+=state.specialists.length?`<div class="grid">`+state.specialists.map(m=>memberCard(m,{showName:true,join:true})).join("")+`</div>`
        :`<div class="empty">아직 채용된 전문가가 없습니다. 외주가 들어오면 필요한 전문가가 채용되어 여기에 누적됩니다.</div>`;
      html+=`<p class="foot">외주가 들어올 때마다 필요한 전문가가 <b>자동 채용</b>되어 명단이 늘어납니다.</p>`;
    }
    else if(route[0]==="p"){
      const p=state.projects[+route.slice(1)];
      html+=head("진행 중인 프로젝트",p.name,`발주처 · ${p.client}`);
      html+=`<div class="detail" style="--rail:var(--st-${p.status})"><div class="detail-head"><div style="flex:1;min-width:0;display:flex;gap:10px;align-items:center;flex-wrap:wrap">${pill(p.status)}<span style="color:var(--text-soft);font-size:13px">${p.members.length}명 편성</span></div><div class="progress"><div class="progress-bar"><div class="progress-fill" style="width:${p.progress}%"></div></div><div class="progress-meta"><span>진행률</span><span class="pct">${p.progress}%</span></div></div></div>${rosterHTML(p.members)}</div>`;
    }
    else if(route[0]==="d"){
      const d=state.done[+route.slice(1)];
      html+=head("완료된 프로젝트",d.name,`발주처 · ${d.client}`);
      html+=`<div class="detail" style="--rail:var(--st-done)"><div class="detail-head">
        <div style="flex:1;min-width:0"><div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">${pill("done")}<span style="color:var(--text-soft);font-size:13px">팀 ${d.teamSize}명 · ${esc(d.finishedOn)} 납품</span></div>
        ${d.summary?`<p style="margin:12px 0 0;font-size:13.5px;color:var(--text-soft);line-height:1.6">${esc(d.summary)}</p>`:""}</div></div>`;
      if(d.deliverables&&d.deliverables.length){
        html+=`<div class="deliverables"><div class="dl-label">납품물</div><div class="sl-links">${d.deliverables.map(x=>`<a class="link-btn" href="${esc(x.url)}" target="_blank" rel="noopener">${esc(x.label)}<span class="ar">↗</span></a>`).join("")}</div></div>`;
      }
      html+=rosterHTML(d.members.map(m=>({...m,status:"done",task:m.name})));
      html+=`</div>`;
    }
    content.innerHTML=html;
    content.querySelectorAll("[data-go]").forEach(n=>n.addEventListener("click",()=>go(n.dataset.go)));
    navBtns.forEach(b=>b.classList.toggle("active",b.dataset.route===route));
    window.scrollTo(0,0);
  }
  function go(id){route=id;render();closeMenu();}

  const sidebar=document.getElementById("sidebar"),backdrop=document.getElementById("backdrop"),hamb=document.getElementById("hamb");
  const openMenu=()=>{sidebar.classList.add("open");backdrop.classList.add("show");hamb.setAttribute("aria-expanded","true");};
  const closeMenu=()=>{sidebar.classList.remove("open");backdrop.classList.remove("show");hamb.setAttribute("aria-expanded","false");};
  hamb.addEventListener("click",()=>sidebar.classList.contains("open")?closeMenu():openMenu());
  backdrop.addEventListener("click",closeMenu);
  document.addEventListener("keydown",e=>{if(e.key==="Escape")closeMenu();});
  render();
</script>

</body>
</html>
